<!DOCTYPE html>
<html
lang="en">
  <head>
    <meta charset="UTF-8">
    <meta viewport="width=device-width",content="initial-scale=1.0">
    <title>Lists</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
              <h1> CSS lists</h1>
    </header>
    <main>
              <article>
                <h2>Ordered List</h2>
                <ol start="3" reversed>
                  <li>step one</li>
                  <li>step two</li>
                  <li>step three</li>
                </ol>
              </article>
              <article>
                <h2>Unordered List</h2>
                <ul>
                  <li>one</li>
                  <li>two</li>
                  <li>three</li>
                </ul>
              </article>
    </main>
    <footer>

    </footer>
  </body>
</html>
