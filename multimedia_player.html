<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia Player</title>
</head>

<body>
  <h1>Multimedia Player</h1>

<section>
  <h2>****** in Paris</h2>
  <audio
  controls
  loop
  aria-label="music player"
  
  >
  <source 
  type="audio/mpeg"
  src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3">
  </audio>
</section>
<section>
<h2>****** in paris</h2>
<video 
controls
width="300"
height="250">
<source
src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
type="video/mp4">

<track 
src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt"
kind="subtitles"
srclang="en"
label="english">
</video>
</section>

<section>
  <h2>Transcript</h2>
  <p>Transcript of the video</p>
</section>
</body>

</html>
