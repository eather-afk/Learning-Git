<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta viewport="width=device-width",content="initial-scale=1.0"> 
        <link  rel="stylesheet" href="styles.css">
        <title>Greeting Card</title>
    </head>

    <body>
        <div id="greeting-card"
             class="card">
            <h1>Happy Birthday!</h1>
            <p class="message">Wishing you all the happiness and joy on your special day!</p>

            <div class="card-links"><a 
                href="#send" 
                class="send-link">Send Card</a>
                <a href="#share" 
                class="share-link">Share on Social Media</a>
        </div>
    </div>
    <section id="send">
        <h2>Sending your Card....</h2>
        <p>Card Send Succesfully</p>
    </section>
    <section id="share">
        <h2>Sharing your Card</h2>
        <p>Card Shared Succesfully
        </p>
    </section>
    </body>
</html>
